# ===========================================
# ShiftApp Frontend — Nginx Configuration
# ===========================================
# Internal-only (behind Caddy reverse proxy).
# Serves the Vite-built React SPA with proper
# fallback routing and compression.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------
    # Gzip compression
    # -----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -----------------------------------------
    # Vite content-hashed assets — long cache
    # -----------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------
    # SPA fallback — all routes serve index.html
    # -----------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------------------
    # Security: deny dotfiles
    # -----------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
