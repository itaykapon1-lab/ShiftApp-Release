services:
  # ===== Backend API =====
  - type: web
    name: shiftapp-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      gunicorn app.main:app
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shiftapp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: shiftapp-rate-limit
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: https://shiftapp-ui.onrender.com
      - key: SOLVER_MAX_WORKERS
        value: "2"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ===== Frontend (Static Site) =====
  - type: web
    name: shiftapp-ui
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        value: https://shiftapp-api.onrender.com/api/v1

  # ===== Redis-Compatible Key Value Store =====
  - type: keyvalue
    name: shiftapp-rate-limit
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: shiftapp-db
    plan: starter
    databaseName: shiftapp
    user: shiftapp
