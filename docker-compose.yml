# ===========================================
# ShiftApp Docker Compose Configuration
# ===========================================
# Production-ready stack with PostgreSQL
#
# Usage:
#   Development (SQLite): python -m uvicorn app.main:app --reload
#   Production (Docker):  docker-compose up -d
#
# ===========================================


services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  db:
    image: postgres:16-alpine
    container_name: shiftapp-db
    environment:
      POSTGRES_DB: shiftapp
      POSTGRES_USER: shiftapp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shiftapp_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftapp -d shiftapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================
  # FastAPI Backend
  # ===========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shiftapp-api
    environment:
      DATABASE_URL: postgresql://shiftapp:${DB_PASSWORD:-shiftapp_secret}@db:5432/shiftapp
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SOLVER_MAX_WORKERS: ${SOLVER_MAX_WORKERS:-4}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ===========================================
  # Frontend (Optional - for full stack)
  # ===========================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: shiftapp-frontend
  #   ports:
  #     - "3000:80"
  #   depends_on:
  #     - api
  #   restart: unless-stopped

volumes:
  pgdata:
    driver: local
