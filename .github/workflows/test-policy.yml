name: Test Policy

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    # Nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      run_nightly_suite:
        description: "Run nightly suite (e2e/chaos/slow) instead of PR gate"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: test-policy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    name: PR Gate (unit + integration + contract)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule' && (github.event_name != 'workflow_dispatch' || !inputs.run_nightly_suite)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run PR gate tests
        run: |
          python -m pytest -q -p no:cacheprovider tests -m "unit or integration or contract"

  nightly:
    name: Nightly (e2e + chaos + slow)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_nightly_suite)
    env:
      RUN_SLOW_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run nightly tests
        run: |
          python -m pytest -q -p no:cacheprovider tests -m "e2e or chaos or slow"

